<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Bikers</title>
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
        }

        header {
            background: #000;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: red;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: red;
        }

        .hero {
            background: url("https://images.unsplash.com/photo-1558980664-10e7170f5b7c") no-repeat center/cover;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 50px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
        }

        .bikes {
            padding: 50px;
            text-align: center;
        }

        .bikes h2 {
            margin-bottom: 30px;
            color: red;
        }

        .bike-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .hero {
            background-image: url("wp1845466-super-bikes-wallpapers.jpg");
            background-size: cover;
            background-position: center;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 5px rgb(56, 3, 3);
        }

        .bike-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            width: 300px;
            transition: 0.3s;
        }

        .bike-card:hover {
            transform: scale(1.05);
        }

        .bike-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .bike-card h3 {
            padding: 15px;
        }

        .bike-card p {
            padding: 0 15px 15px;
            color: #ccc;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>


    <header>
        <h1>ACS Bikers</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="bikes.html">Bikes</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>


    <section class="hero">
        <h2>Ride Your Dream Bike</h2>
    </section>


    <section class="bikes">
        <h2>Our Bikes</h2>

        <div class="bike-container">

            <div class="bike-card">
                <img src="4k-bike-ktm-rc8r-fc0hubs0mlmrxmfu.jpg" alt="Bike 1">
                <h3>Sport Bike</h3>
                <p>High speed performance and stylish design.</p>
            </div>

            <div class="bike-card">
                <img src="view-cool-powerful-motorcycle.jpg" alt="Bike 2">
                <h3>Classic Bike</h3>
                <p>Vintage look with modern comfort.</p>
            </div>

            <div class="bike-card">
                <img src="1920x1080-hd-bikes-ducati-xdiavel-s-vx94hpjc1ase60eu.jpg" alt="Bike 3">
                <h3>Cruiser Bike</h3>
                <p>Perfect for long comfortable rides.</p>
            </div>
        </div>
    </section>


    <footer>
        <p>© 2026 ACS Bikers | All Rights Reserved</p>
    </footer>

</body>

</html>
