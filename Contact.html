<!DOCTYPE html>
<html>

<head>
    <title>Contact - ACS Bikers</title>
     <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000000, #434343);
            color: rgb(12, 165, 220);
        }

        header {
            background: black;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: red;
        }


        .card {
            background: rgb(113, 195, 95);
            color: black;
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }


        .flex {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }


        .profile {
            width: 260px;
            text-align: center;
            background: #c0cd34;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .profile:hover {
            transform: scale(1.05);
        }


        .profile img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgb(16, 4, 4);
            margin-bottom: 10px;
        }

        .profile h3 {
            margin: 10px 0 5px;
        }

        footer {
            background: black;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        ACS Bikers - Contact
    </header>

    <div class="container">

        <div class="card">
            <h2>Company Details</h2>
            <p><b> Address:</b> No.12, Anna Nagar, Chennai, Tamil Nadu, India</p>
            <p><b> Total Employees:</b> 150+</p>
            <p><b>Branches:</b> Chennai, Coimbatore, Madurai, Salem</p>
        </div>


        <div class="card">
            <h2>Founder</h2>
            <div class="flex">
                <div class="profile">
                    <img src="20260131_212035.jpg.jpeg" alt="Founder">
                    <h3>Parthiban</h3>
                    <p>Founder of ACS Bikers</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>CEO</h2>
            <div class="flex">
                <div class="profile">
                    <img src="31006-male-darkness-video-suit-celebrity-3840x2160.jpg" alt="CEO">
                    <h3>Arun Kumar</h3>
                    <p>Chief Executive Officer</p>
                </div>
            </div>
        </div>

    </div>

    <footer>
        © 2026 ACS Bikers | All Rights Reserved
    </footer>

</body>

</html>
